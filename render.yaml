databases:
  - name: notiva-db
    plan: free
    databaseName: notiva
    user: notiva

services:
  - type: web
    name: notiva-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: notiva-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: FRONTEND_URL
        sync: false
